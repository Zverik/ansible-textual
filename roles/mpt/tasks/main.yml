---
- name: Create virtualenv for mpt
  pip:
    virtualenv: "{{ sites }}/osmz.ru/mpt"
    name: git+https://github.com/Zverik/mapping-party-tracker
    state: latest
  notify: restart mpt

- name: Create etc/mpt directory
  become: yes
  file:
    path: /etc/mpt
    owner: zverik
    state: directory

- name: Upload config
  template:
    src: env.j2
    dest: /etc/mpt/env
  notify: restart mpt

- name: Create mpt mysql db
  become: true
  mysql_db:
    name: "{{ mpt_mysql_db }}"
    state: present
  register: mpt_db

- name: Create mpt mysql user
  become: true
  mysql_user:
    name: "{{ mpt_mysql_user }}"
    password: "{{ mpt_mysql_password }}"
    priv: "{{ mpt_mysql_db }}.*:ALL"

- name: Add mpt db to backup
  become: yes
  lineinfile:
    path: /etc/cron.daily/backup
    line: /root/make_backup_db Mpt {{ mpt_mysql_db }}
    regexp: 'make.* Mpt '
    state: present
  tags: backup

- name: Restore mpt db
  when: "'restore' in ansible_run_tags"
  become: yes
  command:
    argv:
      - "/root/extract_backup_db"
      - Mpt
      - "{{ mpt_mysql_db }}"
      - '*'
    chdir: /

- name: Create apache log directory
  become: yes
  file:
    path: "/var/log/apache2/{{ domain }}"
    state: directory
    mode: 0775
    owner: zverik
    group: www-data

- name: Create systemd service
  become: yes
  template:
    src: mpt.service.j2
    dest: /etc/systemd/system/mpt.service
  notify: restart mpt

- name: Enable and start mpt systemd module
  become: yes
  systemd:
    name: mpt
    enabled: yes
    daemon_reload: true
    state: started

- name: Ensure http_proxy is enabled
  become: yes
  apache2_module:
    name: proxy_http
    state: present

- name: Ensure proxy_wstunnel is enabled
  become: yes
  apache2_module:
    name: proxy_wstunnel
    state: present

- name: Check that the certificate exists
  become: yes
  stat:
    path: "{{ cert_path.mpt }}/privkey.pem"
  register: mpt_cert

- name: Add apache domain
  become: yes
  template:
    src: domain.j2
    dest: /etc/apache2/sites-available/{{ domain }}.conf
  notify: reload apache

- name: Enable apache domain
  become: yes
  file:
    src: /etc/apache2/sites-available/{{ domain }}.conf
    dest: /etc/apache2/sites-enabled/{{ domain }}.conf
    state: link
  notify: reload apache
